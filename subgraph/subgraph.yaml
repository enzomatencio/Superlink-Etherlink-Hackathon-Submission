specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SuperlinkUSDVault
    network: etherlink-mainnet
    source:
      address: "0x6183E7BdCBa7eA6b009A52e4f01409dA7107954F"
      abi: SuperlinkUSDVault
      startBlock: 22409286
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Deposit
        - Withdraw
        - Rebalance
        - FeeClaim
        - EmergencyPause
        - Unpause
      abis:
        - name: SuperlinkUSDVault
          file: ./abis/SuperlinkUSDVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Rebalanced(indexed address,indexed address,uint256)
          handler: handleRebalanced
        - event: FeesClaimed(uint256)
          handler: handleFeesClaimed
        - event: EmergencyPaused()
          handler: handleEmergencyPaused
        - event: Unpaused()
          handler: handleUnpaused
      file: ./src/vault.ts